name: Docker QA

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/lararium-mcp

jobs:
  docker-qa:
    name: Build and smoke-test QA image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image (runtime target)
        uses: docker/build-push-action@v5
        with:
          context: .
          target: runtime
          load: true
          tags: lararium-mcp:qa-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: MCP stdio smoke against container
        run: |
          # Pipe a JSON-RPC initialize request into the container and verify response.
          # The container speaks stdio — we use docker run with piped stdin/stdout.

          REQUEST='{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2025-11-25","capabilities":{},"clientInfo":{"name":"ci-smoke","version":"0"}}}'

          RESPONSE=$(echo "$REQUEST" | \
            docker run --rm -i \
              --volume "${{ github.workspace }}/lares:/app/lares:ro" \
              "lararium-mcp:qa-${{ github.sha }}" \
            | head -n 1)

          echo "Response: $RESPONSE"

          # Assert protocolVersion in response
          echo "$RESPONSE" | node -e "
            const d = JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));
            if (d.result?.protocolVersion !== '2025-11-25') {
              console.error('Expected protocolVersion 2025-11-25, got:', d.result?.protocolVersion);
              process.exit(1);
            }
            if (d.result?.serverInfo?.name !== 'lararium') {
              console.error('Expected serverInfo.name lararium, got:', d.result?.serverInfo?.name);
              process.exit(1);
            }
            console.log('Container smoke: OK');
          "

      - name: Push image on main branch
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: .
          target: runtime
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
