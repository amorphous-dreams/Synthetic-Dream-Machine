name: Parity Drift Check

on:
  schedule:
    # Weekly — Mondays at 08:00 UTC
    - cron: "0 8 * * 1"
  workflow_dispatch:

env:
  NODE_VERSION: "24"
  PNPM_VERSION: "10"

jobs:
  parity-drift:
    name: Detect carrier graph drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm -r build

      - name: Regenerate golden fixtures from Node runtime
        run: |
          node - << 'EOF'
          import { createLarariumRuntime, compileInterfaceIndex, compileInvariantIndex } from "./packages/lararium-node/dist/index.js";
          import { writeFileSync } from "fs";

          const runtime = createLarariumRuntime({ writeback: false });
          const minimal = runtime.compileMinimalBoot();
          const full = runtime.compileFullBoot();
          const receipt = runtime.compileBootReceipt(minimal);
          const carriers = runtime.compileCarrierIndex();
          const ifaceIndex = compileInterfaceIndex(carriers);
          const invIndex = compileInvariantIndex(carriers);

          const fixtures = {
            compiler: {
              minimal_boot_count: minimal.memeCount,
              minimal_boot_uris: minimal.closure.map(e => e.uri),
              full_boot_count: full.memeCount,
              receipt_sha256: receipt.sha256,
              receipt_meme_count: receipt.memeCount,
            },
            indexes: {
              carrier_count: carriers.length,
              carrier_uris: carriers.map(c => c.uri),
              interface_count: ifaceIndex.size,
              invariant_count: invIndex.length,
            },
          };

          writeFileSync("lares/lararium-node/fixtures.current.json", JSON.stringify(fixtures, null, 2));
          EOF

      - name: Diff against committed fixtures
        run: |
          node - << 'EOF'
          import { readFileSync } from "fs";

          const committed = JSON.parse(readFileSync("lares/lararium-node/fixtures.golden.json", "utf8"));
          const current = JSON.parse(readFileSync("lares/lararium-node/fixtures.current.json", "utf8"));

          const diffs = [];

          if (committed.compiler?.minimal_boot_count !== current.compiler?.minimal_boot_count) {
            diffs.push(`minimal_boot_count: was ${committed.compiler?.minimal_boot_count}, now ${current.compiler?.minimal_boot_count}`);
          }
          if (committed.compiler?.full_boot_count !== current.compiler?.full_boot_count) {
            diffs.push(`full_boot_count: was ${committed.compiler?.full_boot_count}, now ${current.compiler?.full_boot_count}`);
          }
          if (committed.indexes?.carrier_count !== current.indexes?.carrier_count) {
            diffs.push(`carrier_count: was ${committed.indexes?.carrier_count}, now ${current.indexes?.carrier_count}`);
          }

          if (diffs.length > 0) {
            console.error("Carrier graph drift detected:");
            for (const d of diffs) console.error("  " + d);
            console.error("\nIf this is intentional, regenerate fixtures.golden.json and commit the update.");
            process.exit(1);
          }

          console.log("No drift detected. Parity holds.");
          EOF

      - name: Upload current fixtures on drift
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fixtures-drift
          path: lares/lararium-node/fixtures.current.json
