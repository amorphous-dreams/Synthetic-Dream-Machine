name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "24"
  PNPM_VERSION: "10"

jobs:

  # ─── typecheck ──────────────────────────────────────────────────────────────
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Typecheck all packages
        run: pnpm -r typecheck

  # ─── build ──────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build TW5 browser filter bundle
        run: pnpm --filter @lararium/core tw:build-browser

      - name: Build all packages
        run: pnpm -r build

      - name: Build snapshot.json
        run: pnpm --filter @lararium/node build-snapshot

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: |
            packages/lararium-core/dist
            packages/lararium-node/dist
            packages/lararium-mcp/dist
            packages/lararium-tldraw/dist
            packages/lararium-web/dist
            lares/lararium-node/snapshot.json
          retention-days: 1

  # ─── parity-tests ───────────────────────────────────────────────────────────
  parity-tests:
    name: Parity Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: packages

      - name: Run parity tests (lararium-node)
        run: pnpm --filter @lararium/node test

  # ─── mcp-stdio-smoke ────────────────────────────────────────────────────────
  mcp-stdio-smoke:
    name: MCP stdio smoke
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: packages

      - name: Run MCP stdio smoke
        run: NODE_OPTIONS=--experimental-vm-modules pnpm exec jest --config jest.config.cjs --testPathPattern=tests/stdio-smoke
        working-directory: packages/lararium-mcp
        timeout-minutes: 2
