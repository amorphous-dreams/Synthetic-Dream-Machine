name: Deploy GitHub Pages (prod & preview)

on:
  push:
    branches: ["main", "github-pages-test"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      site-path: ${{ steps.upload.outputs.path }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: "Build with Jekyll"
        run: |
          if [ "${GITHUB_REF}" = "refs/heads/github-pages-test" ]; then
            bundle exec jekyll build --config _config.yml,_config_qa.yml --destination _site/test
          else
            bundle exec jekyll build --config _config.yml --destination _site
          fi

      - name: "Quick smoke test: check site has HTML"
        run: |
          # Fail if _site is missing or seems empty of .html files
          if [ ! -d "./_site" ]; then
            echo "_site missing"
            exit 1
          fi
          shopt -s nullglob || true
          html_count=$(find _site -type f -name '*.html' | wc -l || true)
          echo "Found ${html_count} HTML files"
          if [ "${html_count}" -lt 1 ]; then
            echo "No generated HTML files detected; failing build"
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        id: upload
        with:
          path: "./_site"

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'github-pages' || 'github-pages-preview' }}
      url: ${{ github.ref == 'refs/heads/main' && steps.deployment.outputs.page_url || format('{0}test/', steps.deployment.outputs.page_url) }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
