build_profile = "copilot-root"
manifest_version = 1
package_id = "copilot-root"
renderer_version = "0.2.0"
target_class = "repo-native"
target_platform = "copilot"

[budget]
max_bytes = 32768

[verification]
emit_checksums = true
emit_lockfile = true
emit_report = true

[[outputs]]
kind = "markdown_bundle"
path = ".github/copilot-instructions.md"

[[sources]]
module_id = "lares-kernel"

[sources.transform]
type = "full"

[[sources]]
module_id = "lares-permissions"

[sources.transform]
type = "full"

[[sources]]
module_id = "lares-epistemology"

[sources.transform]
type = "full"

[[sources]]
module_id = "lares-vscode-ops-core"

[sources.transform]
type = "extract_between_markers"
end_marker = "### B8. Golden Prompt/Response Examples"
start_marker = "## CLI Agent Context — VS Code / Repo Operations"

[[sources]]
module_id = "lares-copilot-wrapper"

[sources.transform]
type = "extract_from_marker"
marker = "## Copilot Platform — Worker Registry"
