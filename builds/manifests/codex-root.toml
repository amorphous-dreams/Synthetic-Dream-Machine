build_profile = "codex-root"
manifest_version = 1
package_id = "codex-root"
renderer_version = "0.2.0"
target_class = "repo-native"
target_platform = "codex"

[budget]
max_bytes = 32768

[codex_config]
max_threads = 6
project_doc_max_bytes = 32768

[verification]
emit_checksums = true
emit_lockfile = true
emit_report = true

[[outputs]]
kind = "markdown_bundle"
path = "AGENTS.md"

[[outputs]]
kind = "codex_config"
path = ".codex/config.toml"

[[sources]]
module_id = "lares-kernel"

[sources.transform]
type = "full"

[[sources]]
module_id = "lares-permissions"

[sources.transform]
type = "full"

[[sources]]
module_id = "lares-epistemology"

[sources.transform]
type = "full"

[[sources]]
module_id = "lares-vscode-ops-core"

[sources.transform]
type = "extract_between_markers"
end_marker = "### B8. Golden Prompt/Response Examples"
start_marker = "## CLI Agent Context — VS Code / Repo Operations"

[[sources]]
module_id = "lares-codex-wrapper"

[sources.transform]
type = "extract_from_marker"
marker = "## Codex Platform — Worker Registry"
