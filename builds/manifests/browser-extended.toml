build_profile = "browser-extended"
manifest_version = 1
package_id = "browser-extended"
renderer_version = "0.2.0"
target_class = "browser-safe"
target_platform = "browser"

[budget]
max_bytes = 5200

[verification]
emit_checksums = true
emit_lockfile = true
emit_report = true

[[outputs]]
kind = "single_source_markdown"
path = "builds/rendered/browser-extended/Lares_Kernel.browser-extended.md"

[[sources]]
module_id = "lares-kernel-claude"

[sources.transform]
type = "full"
