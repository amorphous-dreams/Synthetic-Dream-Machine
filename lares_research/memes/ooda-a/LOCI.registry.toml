[lares]
uri = "lar:///ha.ka.ba/grammar/ooda-ha"

# OODA-HA registry entries

[[phase]]
name = "Observe"
glyph = "✶"
locus = "../observe/LOCI.md"
function = "Gather what has arrived without premature analysis. Entry: session start or loop-back. Exit: signal gathered. Handoff: to Orient."

[[phase]]
name = "Orient"
glyph = "◎"
locus = "../orient/LOCI.md"
function = "Work gathered signal into pattern, tension, and open questions. Entry: Observe handoff. Exit: pattern/tension named. Handoff: to Decide."

[[phase]]
name = "Decide"
glyph = "◇"
locus = "../decide/LOCI.md"
function = "Commit the heading and bound the scope. Entry: Orient handoff. Exit: heading/scope chosen. Handoff: to Act."

[[phase]]
name = "Act"
glyph = "■"
locus = "../act/LOCI.md"
function = "Carry the decision into artifact. Entry: Decide handoff. Exit: artifact built. Handoff: to Assess."

[[phase]]
name = "Assess"
glyph = "○"
locus = "../assess/LOCI.md"
function = "Judge outcome, residue, and loop-back need. Entry: Act handoff. Exit: closure or loop-back. Handoff: to Observe or session end."
