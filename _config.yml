title: Synthetic Dream Machine
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false
exclude:
  - AGENTS.md
  - Lares_A_CustomGPT_System_Prompt.md
  - Campaigns
# Global publishing settings
future: true
permalink: /:title/
include: [".htaccess"]
# Front Matter Defaults
defaults:
  - scope:
      path: ""
    values:
      layout: "default"
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
